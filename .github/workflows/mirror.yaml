name: Update GPU Operator Charts

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch:

jobs:
  update_gpu_operator_chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash  

      - name: Add NVIDIA Helm repo 
        run: |
          helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
          helm repo update

      - name: Retrieve Latest NVIDIA GPU Operator Chart Version
        id: get-latest-chart-version
        run: |
          LATEST_CHART_VERSION=$(helm search repo nvidia/gpu-operator --devel --versions --output json | jq -r '.[0].version')
          echo "Latest chart version is: $LATEST_CHART_VERSION"
          echo "LATEST_CHART_VERSION=$LATEST_CHART_VERSION" >> $GITHUB_ENV
  
      - name: Configure MinIO Client
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: helm-charts
        run: |
          # Install MinIO Client (mc)
          curl -O https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          sudo mv mc /usr/local/bin/
          mc alias set myminio $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY --api S3v4

      - name: Check and Update GPU Operator Chart
        env:
          MINIO_BUCKET: helm-charts
          LATEST_CHART_VERSION: ${{ env.LATEST_CHART_VERSION }}
        run: |
          # Check if there are any charts in the MinIO repository
          CHARTS_EXIST=$(mc ls myminio/${MINIO_BUCKET}/nvidia/ | grep '.tgz' | wc -l)
      
          if [ "$CHARTS_EXIST" -eq 0 ]; then
            echo "No existing charts found. Downloading the latest chart and generating index."
            # Pull the latest GPU Operator chart
            helm pull nvidia/gpu-operator --version ${LATEST_CHART_VERSION}
            # Create a new index.yaml
            helm repo index . --url https://minio.ewr.vultrlabs.dev/helm-charts/nvidia
            # Upload the chart and the new index.yaml
            mc cp gpu-operator-${LATEST_CHART_VERSION}.tgz myminio/${MINIO_BUCKET}/nvidia/
            mc cp index.yaml myminio/${MINIO_BUCKET}/nvidia/
            echo "Upload complete for version ${LATEST_CHART_VERSION}."
      
          else
            echo "Existing charts found. Checking for the latest version."
            # Pull the latest GPU Operator chart
            helm pull nvidia/gpu-operator --version ${LATEST_CHART_VERSION}
      
            # Check if the latest chart already exists
            if mc stat myminio/${MINIO_BUCKET}/nvidia/gpu-operator-${LATEST_CHART_VERSION}.tgz; then
              echo "Chart version ${LATEST_CHART_VERSION} already exists. Skipping upload."
            else
              echo "Uploading latest chart version ${LATEST_CHART_VERSION}."
              mc cp gpu-operator-${LATEST_CHART_VERSION}.tgz myminio/${MINIO_BUCKET}/nvidia/
            fi
      
            # Check if index.yaml exists
            if mc stat myminio/${MINIO_BUCKET}/nvidia/index.yaml; then
              echo "Index file exists. Updating index."
              mc cp myminio/${MINIO_BUCKET}/nvidia/index.yaml .  # Download existing index.yaml
              # Generate a new index including all charts in the directory
              helm repo index . --merge index.yaml --url https://minio.ewr.vultrlabs.dev/helm-charts/nvidia
            else
              echo "No index file found. Generating a new index with all existing charts."
              # Generate index.yaml that includes all chart files
              helm repo index . --url https://minio.ewr.vultrlabs.dev/helm-charts/nvidia
            fi
      
            # Upload the updated index.yaml to MinIO
            mc cp index.yaml myminio/${MINIO_BUCKET}/nvidia/
            echo "Upload complete for index.yaml."
          fi