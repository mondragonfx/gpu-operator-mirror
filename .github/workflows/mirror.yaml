name: Update GPU Operator Charts

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch:

jobs:
  update_gpu_operator_chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash  

      - name: Add NVIDIA Helm repo 
        run: |
          helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
          helm repo update

      - name: Retrieve Latest NVIDIA GPU Operator Chart Version
        id: get-latest-chart-version
        run: |
          LATEST_CHART_VERSION=$(helm search repo nvidia/gpu-operator --devel --versions --output json | jq -r '.[0].version')
          echo "Latest chart version is: $LATEST_CHART_VERSION"
          echo "LATEST_CHART_VERSION=$LATEST_CHART_VERSION" >> $GITHUB_ENV
  
      - name: Configure MinIO Client
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: helm-charts
        run: |
          # Install MinIO Client (mc)
          curl -O https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          sudo mv mc /usr/local/bin/
          mc alias set myminio $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY --api S3v4

      - name: Check and Update GPU Operator Chart
        env:
          MINIO_BUCKET: helm-charts
          LATEST_CHART_VERSION: ${{ env.LATEST_CHART_VERSION }}
        run: |
          echo "Checking for existing GPU Operator chart version in MinIO..."

          # Check if the latest chart exists in the MinIO repo
          if mc stat myminio/helm-charts/nvidia/gpu-operator-${LATEST_CHART_VERSION}.tgz; then
            echo "Chart version ${LATEST_CHART_VERSION} already exists in MinIO. Skipping download."
          else
            echo "Chart version ${LATEST_CHART_VERSION} not found in MinIO. Proceeding to download and upload."

            # Pull the latest GPU Operator chart
            helm pull nvidia/gpu-operator --version ${LATEST_CHART_VERSION}
            mc cp gpu-operator-${LATEST_CHART_VERSION}.tgz myminio/helm-charts/nvidia/
            echo "Uploaded latest chart version ${LATEST_CHART_VERSION}."
          fi

          # Check for existing index.yaml
          echo "Checking if index.yaml exists in MinIO..."
          if mc stat myminio/helm-charts/nvidia/index.yaml; then
            echo "Index.yaml found in MinIO. Updating with the latest version..."

            # Merge with existing index.yaml
            mc cp myminio/helm-charts/nvidia/index.yaml .
            helm repo index . --merge index.yaml --url https://minio.ewr.vultrlabs.dev/helm-charts/nvidia
          else
            echo "No index.yaml found in MinIO. Checking for existing chart versions..."

            # Check if there are existing chart versions
            if mc ls myminio/helm-charts/nvidia/ | grep -q 'gpu-operator-'; then
              echo "Existing charts found. Generating index.yaml with all versions..."
              helm repo index myminio/helm-charts/nvidia/ --url https://minio.ewr.vultrlabs.dev/helm-charts/nvidia
            else
              echo "No existing charts found. Generating index.yaml with only the latest version..."
              helm repo index myminio/helm-charts/nvidia/ --url https://minio.ewr.vultrlabs.dev/helm-charts/nvidia --version ${LATEST_CHART_VERSION}
            fi
          fi

          # Upload the newly generated index.yaml
          mc cp index.yaml myminio/helm-charts/nvidia/
          echo "Uploaded index.yaml."